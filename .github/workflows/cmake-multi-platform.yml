name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Map build types to a specific configuration
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    # --- Install Boost Dependencies conditionally per OS ---
    - name: Install Boost (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libboost-all-dev

    - name: Install Boost (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install boost

    - name: Install Boost (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        vcpkg install boost-system:x64-windows
        # Exporting vcpkg integration to configure CMake
        vcpkg integrate install

    # --- Configure CMake ---
    - name: Configure CMake
      # Use a bash shell for all platforms. Windows bash is provided by Git.
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cmake -B "${{ github.workspace }}/build" -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" -DCMAKE_TOOLCHAIN_FILE="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"
        else
          cmake -B "${{ github.workspace }}/build" -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}"
        fi

    # --- Build ---
    - name: Build
      shell: bash
      run: cmake --build "${{ github.workspace }}/build" --config "${{ matrix.build_type }}"

    # --- Upload Artifacts ---
    - name: Upload Executables
      uses: actions/upload-artifact@v4
      with:
        name: executables-${{ matrix.os }}
        path: |
          ${{ github.workspace }}/build/${{ matrix.build_type }}/server*
          ${{ github.workspace }}/build/${{ matrix.build_type }}/client*
          ${{ github.workspace }}/build/server*
          ${{ github.workspace }}/build/client*
